services:
  - type: web
    name: moneytrack-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      # Cole aqui a connection string do Postgres criado no Neon (com ?sslmode=require)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Preencha com a URL final do frontend na Vercel
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
