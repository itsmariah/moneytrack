databases:
  - name: moneytrack-db
    databaseName: moneytrack
    user: moneytrack
    plan: free

services:
  - type: web
    name: moneytrack-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moneytrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Preencha manualmente no dashboard após criar o site estático (moneytrack-frontend):
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: web
    name: moneytrack-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Preencha manualmente no dashboard com a URL do moneytrack-backend (ex: https://moneytrack-backend.onrender.com/api)
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
